version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tododb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./Todo.Api
      dockerfile: Dockerfile
    ports:
      - "3087:3087"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:3087
      ConnectionStrings__Default: "Host=db;Port=5432;Database=tododb;Username=postgres;Password=postgres"
      Jwt__Key: "your-super-secret-jwt-key-that-is-at-least-32-characters-long"
      Jwt__Issuer: "TodoApi"
      Jwt__Audience: "TodoApiUsers"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Redis__ConnectionString: "redis:6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3087
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
